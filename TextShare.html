<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickShare P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f4f9; }
        .container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        #chat { height: 200px; border: 1px solid #ddd; overflow-y: auto; margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #fafafa; }
        input { width: calc(100% - 22px); padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .status { font-size: 0.8rem; margin-bottom: 10px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>Instant Share</h2>
    <div id="status" class="status">Initializing...</div>
    <div id="chat"></div>
    <input type="text" id="messageInput" placeholder="Type text or paste link...">
    <button onclick="sendMessage()">Send to Other Device</button>
    <p id="shareLink" style="word-break: break-all; font-size: 0.8rem; margin-top: 15px; display:none;">
        Open this link on the second device:<br><br>
        <strong id="linkUrl"></strong>
    </p>
</div>

<script>
    const chat = document.getElementById('chat');
    const status = document.getElementById('status');
    const messageInput = document.getElementById('messageInput');
    const shareLink = document.getElementById('shareLink');
    const linkUrl = document.getElementById('linkUrl');

    // Generate a random Room ID or get it from the URL
    const urlParams = new URLSearchParams(window.location.search);
    let roomId = urlParams.get('room');
    const isReceiver = !!roomId;

    if (!roomId) {
        roomId = Math.random().toString(36).substring(2, 8);
    }

    const peer = new Peer(isReceiver ? null : roomId);
    let conn;

    peer.on('open', (id) => {
        if (!isReceiver) {
            status.innerText = "Waiting for other device...";
            const url = window.location.href.split('?')[0] + "?room=" + id;
            shareLink.style.display = "block";
            linkUrl.innerText = url;
        } else {
            status.innerText = "Connecting to sender...";
            conn = peer.connect(roomId);
            setupConnection();
        }
    });

    peer.on('connection', (c) => {
        conn = c;
        setupConnection();
    });

    function setupConnection() {
        conn.on('open', () => {
            status.innerText = "Connected! You can now share text.";
            shareLink.style.display = "none";
        });
        conn.on('data', (data) => {
            addMessage("Received: " + data);
        });
    }

    function sendMessage() {
        const msg = messageInput.value;
        if (msg && conn && conn.open) {
            conn.send(msg);
            addMessage("Sent: " + msg);
            messageInput.value = "";
        } else {
            alert("Not connected yet!");
        }
    }

    function addMessage(text) {
        const p = document.createElement('p');
        p.innerText = text;
        chat.appendChild(p);
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
