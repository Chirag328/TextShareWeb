<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickShare P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; background: #f0f2f5; }
        .container { width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        h2 { margin-top: 0; color: #1a1a1a; }
        #chat { height: 250px; border: 1px solid #eee; overflow-y: auto; margin-bottom: 15px; padding: 10px; border-radius: 10px; background: #fdfdfd; text-align: left; font-size: 0.9rem; display: flex; flex-direction: column; }
        input { width: calc(100% - 24px); padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .status { font-size: 0.85rem; margin-bottom: 15px; color: #666; }
        #qrcode { display: flex; justify-content: center; margin-top: 20px; }
        .msg-box { margin-bottom: 8px; padding: 8px 12px; border-radius: 12px; max-width: 80%; }
        .name-tag { font-size: 0.7rem; font-weight: bold; margin-bottom: 2px; display: block; opacity: 0.7; }
        .received { background: #e9ecef; align-self: flex-start; }
        .sent { background: #007bff; color: white; align-self: flex-end; }
        #setup-name { margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Instant Share</h2>
    
    <div id="setup-name">
        <p>Give this device a name:</p>
        <input type="text" id="deviceName" placeholder="e.g. PC or Phone">
        <button onclick="startApp()">Start Sharing</button>
    </div>

    <div id="main-app" style="display:none;">
        <div id="status" class="status">Connecting...</div>
        <div id="chat"></div>
        <input type="text" id="messageInput" placeholder="Paste link or text...">
        <button onclick="sendMessage()">Send</button>
        
        <div id="setup-area">
            <div id="qrcode"></div>
            <p style="font-size:0.8rem; color:#888; margin-top:10px;">Scan to connect your other device</p>
        </div>
    </div>
</div>

<script>
    let myName = "";
    let conn;
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('r');

    function startApp() {
        myName = document.getElementById('deviceName').value || "Device";
        document.getElementById('setup-name').style.display = "none";
        document.getElementById('main-app').style.display = "block";
        initPeer();
    }

    function initPeer() {
        const isReceiver = !!roomId;
        const shortId = isReceiver ? null : Math.random().toString(36).substring(2, 6);
        const peer = new Peer(isReceiver ? null : shortId);

        peer.on('open', (id) => {
            if (!isReceiver) {
                const shareUrl = window.location.href.split('?')[0] + "?r=" + id;
                new QRCode(document.getElementById("qrcode"), { text: shareUrl, width: 140, height: 140 });
                document.getElementById('status').innerText = `ID: ${id} | Waiting for connection...`;
            } else {
                conn = peer.connect(roomId);
                handleConnection();
            }
        });

        peer.on('connection', (c) => {
            conn = c;
            handleConnection();
        });
    }

    function handleConnection() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "Connected! ✅";
            document.getElementById('setup-area').style.display = "none";
        });
        conn.on('data', (data) => {
            // Data format is { sender: "Name", text: "Message" }
            addMessage(data.text, 'received', data.sender);
        });
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value;
        if (text && conn && conn.open) {
            const payload = { sender: myName, text: text };
            conn.send(payload);
            addMessage(text, 'sent', myName);
            input.value = "";
        }
    }

    function addMessage(text, type, sender) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg-box ${type}`;
        div.innerHTML = `<span class="name-tag">${sender}</span>${text}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('messageInput').addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
